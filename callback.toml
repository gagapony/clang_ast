# callback.toml - Indirect call resolution config for clangd-call-tree
#
# This file defines how to resolve indirect calls that clangd cannot resolve:
#   1. [param_in]  - Callback API parameter mapping
#   2. [func_map]  - Function pointer struct → implementations
#   3. [ioctl_map] - ioctl-like command → handler function
#
# All paths are relative to the project root (-p).
# Copy this file to your project and customize for your codebase.

# ──────────────────────────────────────────────
# Section 1: Callback API parameter index
# ──────────────────────────────────────────────
# Maps API function name → which parameter (0-based) contains the callback.
# The tool will resolve the callback function and continue traversal.
#
# Example: xTaskCreate(taskFunc, ...) → parameter 0 is the callback

[param_in]
# FreeRTOS
xTaskCreate = 0
xTaskCreateStatic = 0
xTaskCreatePinnedToCore = 0

# POSIX
pthread_create = 1
atexit = 0
signal = 1

# C++ Threading
"std::thread::thread" = 0
"std::async" = 0

# Common patterns
registerCallback = 0
setCallback = 0
addEventListener = 1
addListener = 1

# ──────────────────────────────────────────────
# Section 2: Function pointer struct → implementations
# ──────────────────────────────────────────────
# Structure: [func_map.<group>]
#   path      = "<dir>"                    # search directory for targets (non-recursive)
#   "expr"    = ["TargetA", "TargetB"]     # function pointer call → concrete implementations
#
# 'expr' can use dot (obj.Method) or arrow (pObj->Method) syntax.
# If expr contains dots (e.g., g_intf.driver.init), quote it as a string key.
# Multiple groups can have different search paths.
#
# Example code:
#   g_driver.ops->init(pdev);        // direct call
#   REGISTER(g_driver.ops->init);    // passed as arg (also detected)
#
# The tool resolves both cases to all listed targets.

[func_map]

# ── Example: driver ops struct ──
# Code: g_stDriver.ops->Init(pdev, &cfg);
#       CALL(g_stDriver.ops->Init, pdev, &cfg);
#
# [func_map.driver_ops]
# path = "src/drivers"
# g_stDriver.ops->Init = ["DriverA_Init", "DriverB_Init"]
# g_stDriver.ops->DeInit = ["DriverA_DeInit", "DriverB_DeInit"]
# g_stDriver.ops->Start = ["DriverA_Start", "DriverB_Start"]

# ── Example: callback struct with function pointers ──
# Code: pHandler->Process(buf, len);
#
# [func_map.callback]
# path = "src/handlers"
# "pHandler->Process" = ["HandlerA_Process", "HandlerB_Process"]
# "pHandler->Reset" = ["HandlerA_Reset", "HandlerB_Reset"]

# ── Example: vtable / interface pattern ──
# Code: pVtbl->Write(data, size);
#
# [func_map.vtable]
# path = "src/io"
# "pVtbl->Write" = ["Uart_Write", "Spi_Write", "I2c_Write"]
# "pVtbl->Read" = ["Uart_Read", "Spi_Read", "I2c_Read"]

# ──────────────────────────────────────────────
# Section 3: ioctl-like command → handler
# ──────────────────────────────────────────────
# Resolves ioctl wrapper calls to their actual handler functions.
#
# 'format': call pattern where * is a wildcard
# 'path':   directory to search for handler definitions (non-recursive)
# Other keys: command_constant → handler_function
#
# Example code:
#   MI_SYSCALL_SOCID(0, CMD_SET_ATTR, &param)
# Matches format pattern, extracts CMD_SET_ATTR,
# resolves to Handler_SetAttr.
#
# [ioctl_map]
# format = "MI_SYSCALL_SOCID(*,*,*)"
# path = "src/ioctl"
# CMD_SET_ATTR = "Handler_SetAttr"
# CMD_GET_STATUS = "Handler_GetStatus"
# CMD_RESET = "Handler_Reset"

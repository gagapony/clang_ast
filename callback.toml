# callback.toml - Indirect call resolution config for clangd-call-tree
#
# This file defines how to resolve indirect calls that clangd cannot resolve:
#   1. [param_in]  - Callback API parameter mapping
#   2. [func_map]  - Function pointer struct field → implementations
#   3. [ioctl_map] - ioctl-like command → handler function
#
# All paths are relative to the project root (-p).

# ──────────────────────────────────────────────
# Section 1: Callback API parameter index
# ──────────────────────────────────────────────
# Maps API function name → which parameter (0-based) contains the callback.
# The tool will resolve the callback function and continue traversal.
#
# Example: xTaskCreate(taskFunc, ...) → parameter 0 is the callback

# FreeRTOS APIs
[param_in]
xTaskCreate = 0
xTaskCreateStatic = 0
xTaskCreatePinnedToCore = 0

# POSIX APIs
pthread_create = 1
atexit = 0
signal = 1

# C++ Threading
"std::thread::thread" = 0
"std::async" = 0

# Arduino / ESP32
attachInterrupt = 0
setTimeout = 0
setInterval = 0

# Common patterns
registerCallback = 0
setCallback = 0
addEventListener = 1
addListener = 1
on = 1
once = 1
off = 1

# Event handling patterns
emit = 1

# ──────────────────────────────────────────────
# Section 2: Function pointer → implementations
# ──────────────────────────────────────────────
# Structure: func_map → group → {path, expression → targets}
#
# path: directory to search for target function definitions (non-recursive)
# expression: full expression as it appears in code (pC->FreeBins, obj.Method)
# targets: list of actual function names
#
# Multiple groups can share or differ in search paths.

[func_map]

[func_map.ldc_wrapper]
path = "sdk/interface/src/ldc/wrapper"
g_stWrapIntf.stWrapLdc.SetLDCAttr = ["LDC_WRAPPER_LDC_SetChnLDCAttr"]

[func_map.genbin]
path = "sdk/interface/src/ldc/wrapper/src"
"pC->Init" = ["LDC_EPTZ_Init", "LDC_CVLIB_Init", "LDC_EIS_EPTZ_Init"]
"pC->DeInit" = ["LDC_EPTZ_DeInit", "LDC_CVLIB_DeInit", "LDC_EIS_EPTZ_DeInit"]
"pC->UpdateCfg" = ["LDC_EPTZ_UpdateCfg", "LDC_CVLIB_UpdateCfg", "LDC_EIS_EPTZ_UpdateCfg"]
"pC->GenBins" = ["LDC_EPTZ_GenBins", "LDC_CVLIB_GenBins", "LDC_EIS_EPTZ_GenBins"]
"pC->FreeBins" = ["LDC_EPTZ_FreeBins", "LDC_CVLIB_FreeBins", "LDC_EIS_EPTZ_FreeBins"]
"pC->MapBorderInit" = ["LDC_EPTZ_MapBorderInit"]
"pC->MapBorderDeInit" = ["LDC_EPTZ_MapBorderDeInit"]
"pC->MapBorderGetSize" = ["LDC_EPTZ_GetMapBorderSize"]
"pC->MapBorderGetData" = ["LDC_EPTZ_GenMapBorderData"]
"pC->QueryMapPoints" = ["LDC_EPTZ_QueryMapPoints", "LDC_CVLIB_QueryMapPoints"]
"pC->GetDispMapSize" = ["LDC_CVLIB_GetDispMapSize"]
"pC->GetDispMapInfo" = ["LDC_CVLIB_GetDispMapInfo"]
"pC->QueryMapPoint" = ["LDC_CVLIB_QueryMapPoint"]
"pC->CalcMotion" = ["LDC_CVLIB_MotionMapCalc"]
"pC->GetBoundaryParam" = ["LDC_EIS_EPTZ_GetBoundaryParam"]

# ──────────────────────────────────────────────
# Section 3: ioctl-like command → handler
# ──────────────────────────────────────────────
# When code calls an ioctl wrapper function, resolve the command
# to its actual handler function.
#
# 'format': the call pattern where * is a wildcard
# Other keys: command_constant → handler_function
#
# Example code:
#   MI_SYSCALL_SOCID(0, LDC_IOC_SET_ATTR, &param)
# Matches format pattern, extracts LDC_IOC_SET_ATTR,
# resolves to MI_LDC_SetChnLDCAttr.
#
# [ioctl_map]
# format = "MI_SYSCALL_SOCID(*,*,*)"
# LDC_IOC_SET_ATTR = "MI_LDC_SetChnLDCAttr"
# LDC_IOC_GET_STATUS = "MI_LDC_GetChnLDCAttr"

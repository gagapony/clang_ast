# Callback API Configuration

# Format: api_name:param_index
# api_name: Function name (can include namespace)
# param_index: Zero-based index of callback parameter
#
# Examples:
#   xTaskCreate:0          # First parameter (0-based) is the callback function
#   pthread_create:1         # Second parameter (1-based) is the start_routine
#   std::thread::thread:0    # First parameter is the function object

# FreeRTOS APIs
